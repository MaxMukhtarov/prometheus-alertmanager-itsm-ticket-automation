services:
  prometheus:
    image: prom/prometheus:latest
    container_name: project1-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./alerts.yml:/etc/prometheus/alerts.yml
    networks:
      - monitoring-net

  alertmanager:
    image: prom/alertmanager:latest
    container_name: project1-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml
    networks:
      - monitoring-net

  webhook:
    build: ./webhook
    container_name: project1-webhook
    ports:
      - "5000:5000"
    depends_on:
      - alertmanager
    networks:
      - monitoring-net
    env_file:
      - .env

networks:
  monitoring-net:
    external: true